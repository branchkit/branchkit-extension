<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Regime B recall fixture</title>
  <style>
    body { margin: 0; font: 13px/1.3 system-ui, sans-serif; }
    nav { display: flex; flex-direction: column; }
    nav a { display: block; padding: 4px 10px; color: #0a58ca; text-decoration: none; }
  </style>
</head>
<body>
  <!-- Many links with stable, unique hrefs. The harness claims codewords for
       them, persists the fingerprint->codeword memory, full-reloads the page,
       and measures how many got their letter back. Count is deliberately above
       the reservoir's 100-codeword initial preferred-fill so the cap shows. -->
  <nav id="sidebar"></nav>
  <script>
    const nav = document.getElementById('sidebar');
    for (let i = 0; i < 130; i++) {
      const a = document.createElement('a');
      a.setAttribute('href', '/app/table/' + i);
      a.textContent = 'Table ' + i;
      nav.appendChild(a);
    }
  </script>
</body>
</html>

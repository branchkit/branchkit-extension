<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>BranchKit — Command palette</title>
  <style>
    /* The page renders inside a full-viewport transparent iframe over the host
       page; visuals match the help overlay (render/help-overlay.ts). */
    html, body { margin: 0; height: 100%; background: transparent; }
    body {
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #c9d1d9;
    }
    #backdrop {
      position: fixed; inset: 0;
      background: rgba(1, 4, 9, 0.45);
      display: flex; align-items: flex-start; justify-content: center;
    }
    #panel {
      margin-top: 12vh;
      width: min(640px, 92vw);
      background: #0d1117;
      border: 1px solid #30363d; border-radius: 10px;
      box-shadow: 0 16px 48px rgba(1, 4, 9, 0.6);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    #query {
      box-sizing: border-box; width: 100%;
      background: #010409; color: #f0f6fc;
      border: 0; border-bottom: 1px solid #30363d; outline: none;
      font: inherit; font-size: 15px;
      padding: 12px 14px;
    }
    #query::placeholder { color: #6e7681; }
    #list {
      max-height: 52vh; overflow-y: auto; padding: 6px 0 8px;
      /* Slim scrollbar, track matching the panel background. The standard
         properties cover Chrome 121+ and Firefox alike. */
      scrollbar-width: thin;
      scrollbar-color: #30363d #0d1117;
    }
    .sec {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.05em; color: #58a6ff;
      padding: 8px 14px 3px;
    }
    .row {
      display: flex; align-items: baseline; gap: 8px;
      padding: 5px 14px; cursor: pointer;
      font-size: 13px; line-height: 1.35;
    }
    .row.sel { background: #1f6feb33; }
    .row:hover:not(.sel) { background: #161b22; }
    .title { color: #e6edf3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    /* Spoken codeword badge — the voice handle for the row. Hint-badge yellow
       family so the affordance reads the same as page hints. */
    .cw {
      flex: 0 0 auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 10px;
      font-weight: 600;
      background: #f2cc60; color: #1c2128;
      border-radius: 3px; padding: 0 4px; white-space: nowrap;
    }
    .sub {
      color: #8b949e; font-size: 11px; flex: 1 1 auto; min-width: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .meta { flex: 0 0 auto; display: flex; gap: 4px; align-items: baseline; margin-left: auto; }
    .say { color: #8b949e; font-style: italic; font-size: 11px; white-space: nowrap; }
    kbd {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 10px;
      background: #21262d; color: #e6edf3; border: 1px solid #30363d;
      border-bottom-width: 2px; border-radius: 3px; padding: 0 4px; white-space: nowrap;
    }
    .empty { color: #8b949e; font-size: 12px; padding: 14px; }
  </style>
</head>
<body>
  <div id="backdrop">
    <div id="panel">
      <input id="query" type="text" placeholder="Search tabs and commands…"
             autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      <div id="list"></div>
    </div>
  </div>
  <script src="palette.js"></script>
</body>
</html>

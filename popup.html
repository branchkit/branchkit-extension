<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    /* GitHub-dark palette, matched to the keyboard help overlay
       (src/render/help-overlay.ts) so the two surfaces read as one product. */
    :root {
      color-scheme: dark;
      --bg: #0d1117;
      --surface: #161b22;
      --deep: #010409;
      --fg: #c9d1d9;
      --fg-bright: #f0f6fc;
      --fg-muted: #8b949e;
      --border: #21262d;
      --border-strong: #30363d;
      --accent: #58a6ff;      /* links, text, outlines */
      --accent-btn: #1f6feb;  /* filled button backgrounds */
      --ok: #3fb950;
      --danger: #f85149;
      --exclude: #f85149;
      --include: #3fb950;
      --reveal: #58a6ff;
    }
    body {
      /* 400: the popup graduated from status readout to rules editor —
         selectors and the add form need width — but it also overlays the
         page during live nudge tuning, so bigger isn't free. */
      width: 400px;
      /* No bottom padding — the sticky footer owns the bottom inset, so it
         can sit flush against the popup's bottom edge while content scrolls
         beneath it. */
      padding: 14px 16px 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: var(--fg);
      background: var(--bg);
      margin: 0;
    }
    input[type="checkbox"] { accent-color: var(--accent); }
    /* Make the `hidden` attribute authoritative. Several rows set display:flex
       (.setting, .readout), which outranks the UA `[hidden] { display: none }`
       — so JS setting `.hidden = true` (e.g. the Voice toggle when BranchKit is
       not detected) silently did nothing and the row stayed visible. One rule
       enforces the HTML semantics everywhere instead of per-class patches. */
    [hidden] { display: none !important; }
    h2 {
      font-size: 15px;
      margin: 0 0 10px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h2 img { width: 20px; height: 20px; }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.connected { background: var(--ok); }
    .dot.disconnected { background: var(--danger); }
    .dot.paused { background: #9e9e9e; }

    /* --- Live "this page" readout --- */
    .readout {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 0 0 10px;
      font-size: 12px;
      color: var(--fg-muted);
    }
    .readout-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #484f58;
    }
    .readout-dot.on { background: var(--accent); }
    .readout-count { color: var(--fg); font-variant-numeric: tabular-nums; }
    /* Show/Hide button — the UI twin of Shift+F, right-aligned in the readout. */
    .readout-toggle {
      margin-left: auto;
      font: inherit;
      font-size: 11px;
      padding: 3px 9px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--fg);
      border-radius: 4px;
      cursor: pointer;
    }
    .readout-toggle:hover { border-color: var(--accent); background: rgba(88, 166, 255, 0.1); }

    /* --- Segmented pill controls (replaces per-setting dropdowns) --- */
    .segmented {
      display: inline-flex;
      gap: 2px;
      padding: 2px;
      background: var(--deep);
      border: 1px solid var(--border-strong);
      border-radius: 7px;
    }
    .seg {
      font: inherit;
      font-size: 12px;
      line-height: 1.3;
      padding: 3px 10px;
      border: none;
      border-radius: 5px;
      background: transparent;
      color: var(--fg-muted);
      cursor: pointer;
      white-space: nowrap;
    }
    .seg:hover:not(.active) { color: var(--fg); }
    .seg.active {
      background: var(--border-strong);
      color: var(--fg-bright);
      font-weight: 500;
      box-shadow: 0 1px 2px rgba(1, 4, 9, 0.6);
    }
    /* Read-only Off (BranchKit not detected): a single muted, non-interactive
       segment — reads as "voice is off, nothing to toggle" without offering a
       control that can't act. */
    .voice-off .seg:disabled { cursor: default; color: var(--fg-muted); opacity: 0.7; }
    .voice-off .seg:hover { color: var(--fg-muted); }
    .setting {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
      border-top: 1px solid var(--border);
    }
    /* Rows that belong to a section (no dividing line above them). */
    .setting.flush { border-top: none; padding: 4px 0; }
    .setting label { font-size: 12px; color: #adbac7; }
    .passkeys-input {
      font: inherit; font-size: 12px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      width: 130px; padding: 4px 8px;
      background: var(--card); color: var(--fg);
      border: 1px solid var(--border); border-radius: 6px;
    }
    .passkeys-input:focus { border-color: var(--accent); outline: none; }
    .passkeys-input:disabled { opacity: 0.4; cursor: not-allowed; }
    .setting select {
      font-size: 12px;
      padding: 2px 4px;
      border: 1px solid var(--border-strong);
      border-radius: 4px;
      background: var(--bg);
      color: var(--fg);
    }
    .setting button.keycapture {
      font-size: 12px;
      font-family: inherit;
      padding: 2px 8px;
      min-width: 92px;
      border: 1px solid var(--border-strong);
      border-radius: 4px;
      background: var(--bg);
      color: var(--fg);
      cursor: pointer;
    }
    .setting button.keycapture.capturing {
      border-color: var(--accent);
      color: var(--fg-muted);
      font-style: italic;
    }
    .setting-hint {
      font-size: 11px;
      color: var(--danger);
      padding: 0 0 6px;
    }

    /* --- Per-site rule section --- */
    .rules-section {
      margin-top: 8px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }
    .rules-header {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--fg-muted);
      margin-bottom: 6px;
    }
    .rules-host {
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
      color: var(--fg);
      text-transform: none;
      letter-spacing: 0;
    }
    .rule-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
    }
    .rule-card.disabled { opacity: 0.6; }
    .rule-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .rule-pattern {
      flex: 1;
      font-family: ui-monospace, SFMono-Regular, monospace;
      font-size: 12px;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .badge-size-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
    }
    .badge-size-label {
      font-size: 11px;
      color: var(--fg-muted);
      flex: none;
    }
    .badge-size-slider { flex: 1; min-width: 0; margin: 0; }
    .badge-size-num {
      width: 52px;
      flex: none;
      text-align: right;
      font: inherit;
      font-size: 12px;
      padding: 3px 5px;
      background: var(--bg);
      color: var(--fg);
      border: 1px solid var(--border-strong);
      border-radius: 4px;
    }
    .badge-size-num::placeholder { color: var(--fg-muted); }
    .badge-size-clear {
      font: inherit;
      padding: 0 4px;
      border: none;
      background: none;
      color: var(--fg-muted);
      cursor: pointer;
    }
    .badge-size-clear:hover { color: var(--fg); }
    .entries-list {
      margin-top: 6px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .entries-list:empty::before {
      content: "No entries yet.";
      font-size: 11px;
      color: var(--fg-muted);
      font-style: italic;
    }
    .entry {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
    }
    .entry-toggle { margin: 0; flex: none; cursor: pointer; }
    .entry-off .entry-text { opacity: 0.45; text-decoration: line-through; }
    .entry-off .entry-kind { opacity: 0.4; }
    .entry-kind {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 9px;
      font-weight: bold;
    }
    .entry-kind.exclude { background: var(--exclude); }
    .entry-kind.include { background: var(--include); }
    .entry-kind.reveal { background: var(--reveal); }
    .entry-kind.nudge { background: var(--accent-btn); }
    .add-entry-row input.nudge-px { width: 52px; flex: none; text-align: right; }
    .entry-edit {
      font: inherit;
      padding: 0 4px;
      border: none;
      background: none;
      color: var(--fg-muted);
      cursor: pointer;
      font-size: 12px;
      line-height: 1;
    }
    .entry-edit:hover { color: var(--accent); }
    .entry-cancel {
      font: inherit;
      font-size: 12px;
      padding: 5px 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: none;
      color: var(--fg-muted);
      cursor: pointer;
    }
    .entry-cancel:hover { color: var(--fg); border-color: var(--border-strong); }
    .entry-text {
      flex: 1;
      font-family: ui-monospace, SFMono-Regular, monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--fg);
    }
    .entry-remove {
      font: inherit;
      padding: 0 4px;
      border: none;
      background: none;
      color: var(--fg-muted);
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
    }
    .entry-remove:hover { color: var(--danger); }
    .add-entry {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px dashed var(--border);
    }
    .add-entry-row {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 4px;
    }
    .nudge-row-label {
      color: var(--fg-muted);
      font-size: 12px;
      align-self: center;
    }
    .add-entry-row.actions-row { justify-content: flex-end; margin-top: 6px; }
    .add-entry-row select,
    .add-entry-row input,
    .add-entry-row button {
      font: inherit;
      padding: 3px 6px;
      border: 1px solid var(--border-strong);
      border-radius: 4px;
      background: var(--bg);
      color: var(--fg);
      font-size: 12px;
    }
    .add-entry-row input::placeholder { color: var(--fg-muted); }
    .add-entry-row select { flex: 0 0 auto; }
    .add-entry-row input.matcher,
    .add-entry-row input.codeword {
      flex: 1;
      /* Real floor, not 0: flex items shrink before they wrap, so a
         crowded row (edit mode: Save + Cancel visible) collapsed the
         matcher to zero width instead of wrapping it to its own line. */
      min-width: 120px;
      font-family: ui-monospace, SFMono-Regular, monospace;
    }
    .add-entry-row input.matcher.invalid { border-color: var(--danger); }
    .add-entry-row button.primary {
      background: var(--accent-btn);
      border-color: var(--accent-btn);
      color: #fff;
      cursor: pointer;
    }
    .add-entry-row button.primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .add-entry-row button.secondary {
      cursor: pointer;
    }
    .resolve-row {
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .resolve-row label {
      font-size: 11px;
      color: var(--fg-muted);
    }
    .feedback {
      font-size: 11px;
      color: var(--fg-muted);
      margin-top: 4px;
      min-height: 14px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .feedback.error { color: var(--danger); }
    .feedback code {
      background: var(--border);
      padding: 0 3px;
      border-radius: 3px;
      font-family: ui-monospace, SFMono-Regular, monospace;
    }
    .no-rule {
      font-size: 12px;
      color: var(--fg-muted);
    }
    .no-rule button {
      font: inherit;
      padding: 4px 10px;
      border: 1px solid var(--border);
      background: none;
      color: var(--accent);
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    .no-rule button:hover { border-color: var(--accent); background: rgba(88, 166, 255, 0.1); }
    .no-rule button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      background: var(--surface);
      border-color: var(--border-strong);
    }
    .add-rule-row { margin-top: 10px; }
    .add-rule-row button {
      font: inherit;
      font-size: 12px;
      padding: 5px 10px;
      width: 100%;
      border: 1px dashed var(--accent);
      background: transparent;
      color: var(--accent);
      border-radius: 4px;
      cursor: pointer;
    }
    .add-rule-row button:hover { background: rgba(255, 255, 255, 0.06); }

    .info {
      color: var(--fg-muted);
      font-size: 11px;
      margin-top: 12px;
      border-top: 1px solid var(--border);
      padding-top: 8px;
    }
    .popup-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      /* Sticky at the popup's bottom edge so Settings/Help stay reachable
         when long rule lists push the natural footer position below the
         fold. Bleeds over the body's side padding (negative margins) and
         carries an opaque background so scrolling content passes under it. */
      position: sticky;
      bottom: 0;
      background: var(--bg);
      margin: 10px -16px 0;
      padding: 8px 16px 12px;
      border-top: 1px solid var(--border);
    }
    .footer-btn {
      font: inherit;
      font-size: 12px;
      cursor: pointer;
      background: none;
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 5px 10px;
    }
    .footer-help {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--fg-muted);
    }
    .footer-help:hover { color: var(--fg); border-color: var(--border); }
    .footer-key {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 17px;
      height: 17px;
      padding: 0 3px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      line-height: 1;
    }
    .footer-settings {
      color: #fff;
      background: var(--accent-btn);
      border-color: var(--accent-btn);
    }
    .footer-settings:hover { filter: brightness(1.1); }
    .grant-access {
      font: inherit;
      font-size: 12px;
      display: block;
      width: 100%;
      margin: 2px 0 8px;
      padding: 5px 10px;
      border: 1px solid var(--accent-btn);
      background: var(--accent-btn);
      color: #fff;
      border-radius: 4px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h2><img src="icons/icon48.png" alt="">BranchKit Browser</h2>
  <div class="status">
    <span class="dot" id="dot"></span>
    <span id="status-text">Checking...</span>
  </div>
  <button id="grant-access" class="grant-access" hidden
          title="Lets the extension reach the BranchKit app on your computer (127.0.0.1). Firefox requires granting this host access before voice can connect.">
    Allow BranchKit connection
  </button>
  <div class="readout" id="readout" hidden>
    <span class="readout-dot" id="readout-dot"></span>
    <span id="readout-text"></span>
    <button id="readout-toggle" class="readout-toggle" hidden></button>
  </div>

  <div class="setting" id="voice-pause-setting" hidden
       title="Pause voice to stop this browser engaging BranchKit. Hints and keyboard keep working and badges stay visible — only spoken control stops. Stays paused until you switch it back on.">
    <label>Voice</label>
    <!-- Interactive On/Paused — shown when BranchKit is connected or paused. -->
    <div class="segmented" id="voice-pause" role="radiogroup" aria-label="Voice">
      <button class="seg active" data-value="on" role="radio">On</button>
      <button class="seg" data-value="off" role="radio">Paused</button>
    </div>
    <!-- Read-only Off — shown when BranchKit is not detected (nothing to
         pause; voice just isn't available). -->
    <div class="segmented voice-off" id="voice-off" hidden aria-label="Voice off — BranchKit not detected">
      <button class="seg" disabled>Off</button>
    </div>
  </div>

  <div class="setting">
    <label>Badge Persistence</label>
    <div class="segmented" id="hint-visibility" role="radiogroup" aria-label="Badge Persistence">
      <button class="seg active" data-value="always" role="radio">Always</button>
      <button class="seg" data-value="manual" role="radio">Manual</button>
    </div>
  </div>
  <div class="setting">
    <label>Badge Labels</label>
    <div class="segmented" id="hint-mode" role="radiogroup" aria-label="Badge Labels">
      <button class="seg active" data-value="letter" role="radio">Letters</button>
      <button class="seg" data-value="word" role="radio">Words</button>
      <button class="seg" data-value="expand" role="radio">Expand</button>
    </div>
  </div>
  <div class="setting" title="Prefix each tab's title with a codeword label (e.g. '[a] GitHub') so you can see the word to say or the letter to type. Press T or say 'tab' to switch.">
    <label>Badge Tabs</label>
    <div class="segmented" id="tab-markers" role="radiogroup" aria-label="Badge Tabs">
      <button class="seg active" data-value="on" role="radio">On</button>
      <button class="seg" data-value="off" role="radio">Off</button>
    </div>
  </div>
  <div class="rules-section" id="rules-section">
    <div class="rules-header">
      Badge rules for <span class="rules-host" id="rules-host">…</span>
    </div>
    <div id="rules-body"></div>
  </div>

  <div class="rules-section" id="key-rules-section">
    <div class="rules-header">Key rules for <span class="rules-host" id="key-rules-host">…</span></div>
    <div class="no-rule" id="key-rule-empty">
      No rule for this site.
      <button id="key-create-rule">+ Create rule</button>
    </div>
    <div id="key-rule-controls" hidden>
      <div class="setting flush" id="key-passthrough-setting" title="Keys to hand to this site while your other BranchKit shortcuts keep working — e.g. jke#r for Gmail. Type the characters; each is one key.">
        <label for="key-passthrough">Pass keys to site</label>
        <input type="text" id="key-passthrough" class="passkeys-input" placeholder="e.g. jke#" spellcheck="false" autocomplete="off" autocapitalize="off">
      </div>
      <div class="setting flush" id="key-shortcuts-setting" title="Turn off ALL of BranchKit's keyboard shortcuts on this site so the site's own keys work. Voice still works. (Press i on any page to pass keys through temporarily.)">
        <label>Disable all shortcuts</label>
        <div class="segmented" id="key-disable-all" role="radiogroup" aria-label="Disable all shortcuts">
          <button class="seg" data-value="on" role="radio">On</button>
          <button class="seg active" data-value="off" role="radio">Off</button>
        </div>
      </div>
    </div>
  </div>

  <div class="popup-footer">
    <button id="open-help" class="footer-btn footer-help"
            title="Press ? or say &quot;help&quot; to open this anytime">
      <span class="footer-key">?</span> Help
    </button>
    <button id="open-options" class="footer-btn footer-settings">Settings</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>

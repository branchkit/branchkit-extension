<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --fg: #333;
      --fg-muted: #777;
      --border: #eee;
      --accent: #0a84ff;
      --ok: #34c759;
      --danger: #ff3b30;
      --exclude: #ff3b30;
      --include: #34c759;
      --reveal: #0a84ff;
    }
    body {
      width: 340px;
      padding: 14px 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: var(--fg);
      margin: 0;
    }
    h2 {
      font-size: 15px;
      margin: 0 0 10px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h2 img { width: 20px; height: 20px; }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.connected { background: var(--ok); }
    .dot.disconnected { background: var(--danger); }
    .setting {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
      border-top: 1px solid var(--border);
    }
    .setting label { font-size: 12px; color: #555; }
    .setting select {
      font-size: 12px;
      padding: 2px 4px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
    }
    .setting button.keycapture {
      font-size: 12px;
      font-family: inherit;
      padding: 2px 8px;
      min-width: 92px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
    }
    .setting button.keycapture.capturing {
      border-color: #4a90d9;
      color: #888;
      font-style: italic;
    }
    .setting-hint {
      font-size: 11px;
      color: var(--danger);
      padding: 0 0 6px;
    }

    /* --- Per-site rule section --- */
    .rules-section {
      margin-top: 8px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }
    .rules-header {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--fg-muted);
      margin-bottom: 6px;
    }
    .rules-host {
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
      color: var(--fg);
      text-transform: none;
      letter-spacing: 0;
    }
    .rule-card {
      background: #fafafa;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
    }
    .rule-card.disabled { opacity: 0.6; }
    .rule-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .rule-pattern {
      flex: 1;
      font-family: ui-monospace, SFMono-Regular, monospace;
      font-size: 12px;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .entries-list {
      margin-top: 6px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .entries-list:empty::before {
      content: "No entries yet.";
      font-size: 11px;
      color: var(--fg-muted);
      font-style: italic;
    }
    .entry {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
    }
    .entry-toggle { margin: 0; flex: none; cursor: pointer; }
    .entry-off .entry-text { opacity: 0.45; text-decoration: line-through; }
    .entry-off .entry-kind { opacity: 0.4; }
    .entry-kind {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 9px;
      font-weight: bold;
    }
    .entry-kind.exclude { background: var(--exclude); }
    .entry-kind.include { background: var(--include); }
    .entry-kind.reveal { background: var(--reveal); }
    .entry-text {
      flex: 1;
      font-family: ui-monospace, SFMono-Regular, monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--fg);
    }
    .entry-remove {
      font: inherit;
      padding: 0 4px;
      border: none;
      background: none;
      color: var(--fg-muted);
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
    }
    .entry-remove:hover { color: var(--danger); }
    .add-entry {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px dashed var(--border);
    }
    .add-entry-row {
      display: flex;
      gap: 4px;
      margin-bottom: 4px;
    }
    .add-entry-row select,
    .add-entry-row input,
    .add-entry-row button {
      font: inherit;
      padding: 3px 6px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      font-size: 12px;
    }
    .add-entry-row select { flex: 0 0 auto; }
    .add-entry-row input.matcher,
    .add-entry-row input.codeword {
      flex: 1;
      min-width: 0;
      font-family: ui-monospace, SFMono-Regular, monospace;
    }
    .add-entry-row input.matcher.invalid { border-color: var(--danger); }
    .add-entry-row button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
      cursor: pointer;
    }
    .add-entry-row button.primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .add-entry-row button.secondary {
      cursor: pointer;
    }
    .resolve-row {
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .resolve-row label {
      font-size: 11px;
      color: var(--fg-muted);
    }
    .feedback {
      font-size: 11px;
      color: var(--fg-muted);
      margin-top: 4px;
      min-height: 14px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .feedback.error { color: var(--danger); }
    .feedback code {
      background: #f0f0f3;
      padding: 0 3px;
      border-radius: 3px;
      font-family: ui-monospace, SFMono-Regular, monospace;
    }
    .no-rule {
      font-size: 12px;
      color: var(--fg-muted);
    }
    .no-rule .suggested {
      margin: 6px 0;
      font-family: ui-monospace, SFMono-Regular, monospace;
      color: var(--fg);
    }
    .no-rule button {
      font: inherit;
      padding: 4px 10px;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: white;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    .no-rule button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      background: #ccc;
      border-color: #ccc;
    }
    .add-rule-row { margin-top: 10px; }
    .add-rule-row button {
      font: inherit;
      font-size: 12px;
      padding: 5px 10px;
      width: 100%;
      border: 1px dashed var(--accent);
      background: transparent;
      color: var(--accent);
      border-radius: 4px;
      cursor: pointer;
    }
    .add-rule-row button:hover { background: rgba(0, 0, 0, 0.04); }

    .info {
      color: #888;
      font-size: 11px;
      margin-top: 12px;
      border-top: 1px solid var(--border);
      padding-top: 8px;
    }
    .options-link {
      display: block;
      text-align: center;
      margin-top: 6px;
      padding: 6px 0;
      font-size: 12px;
      color: var(--accent);
      text-decoration: none;
      cursor: pointer;
      background: none;
      border: none;
      width: 100%;
    }
    .options-link:hover { text-decoration: underline; }
    .grant-access {
      font: inherit;
      font-size: 12px;
      display: block;
      width: 100%;
      margin: 2px 0 8px;
      padding: 5px 10px;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: white;
      border-radius: 4px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h2><img src="icons/icon48.png" alt="">BranchKit Browser</h2>
  <div class="status">
    <span class="dot" id="dot"></span>
    <span id="status-text">Checking...</span>
  </div>
  <button id="grant-access" class="grant-access" hidden
          title="Firefox requires granting host access before the extension can reach BranchKit on this machine">
    Grant local access
  </button>
  <div class="setting">
    <label for="hint-visibility">Hints</label>
    <select id="hint-visibility">
      <option value="always">Always visible</option>
      <option value="manual">On keypress (f)</option>
    </select>
  </div>
  <div class="setting">
    <label for="hint-mode">Hint labels</label>
    <select id="hint-mode">
      <option value="letter">Letters</option>
      <option value="first-word">First word</option>
      <option value="word">Words</option>
      <option value="both">Both</option>
    </select>
  </div>
  <div class="setting" title="Prefix each tab's title with a codeword label (e.g. '[a] GitHub') so you can see the word to say or the letter to type. Press T or say 'tab' to switch.">
    <label for="tab-markers">Mark tabs</label>
    <input type="checkbox" id="tab-markers">
  </div>

  <div class="rules-section" id="rules-section">
    <div class="rules-header">
      Rules for <span class="rules-host" id="rules-host">…</span>
    </div>
    <div id="rules-body"></div>
  </div>

  <button id="open-options" class="options-link">All domain rules…</button>
  <script src="popup.js"></script>
</body>
</html>

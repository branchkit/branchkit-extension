<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    /* GitHub-dark palette, matched to the keyboard help overlay
       (src/render/help-overlay.ts) so the two surfaces read as one product. */
    :root {
      color-scheme: dark;
      --bg: #0d1117;
      --surface: #161b22;
      --deep: #010409;
      --fg: #c9d1d9;
      --fg-bright: #f0f6fc;
      --fg-muted: #8b949e;
      --border: #21262d;
      --border-strong: #30363d;
      --accent: #58a6ff;      /* links, text, outlines */
      --accent-btn: #1f6feb;  /* filled button backgrounds */
      --ok: #3fb950;
      --danger: #f85149;
      --exclude: #f85149;
      --include: #3fb950;
      --reveal: #58a6ff;
    }
    body {
      width: 340px;
      padding: 14px 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: var(--fg);
      background: var(--bg);
      margin: 0;
    }
    input[type="checkbox"] { accent-color: var(--accent); }
    h2 {
      font-size: 15px;
      margin: 0 0 10px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h2 img { width: 20px; height: 20px; }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.connected { background: var(--ok); }
    .dot.disconnected { background: var(--danger); }

    /* --- Live "this page" readout --- */
    .readout {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 0 0 10px;
      font-size: 12px;
      color: var(--fg-muted);
    }
    .readout-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #484f58;
    }
    .readout-dot.on { background: var(--accent); }
    .readout-count { color: var(--fg); font-variant-numeric: tabular-nums; }

    /* --- Segmented pill controls (replaces per-setting dropdowns) --- */
    .segmented {
      display: inline-flex;
      gap: 2px;
      padding: 2px;
      background: var(--deep);
      border: 1px solid var(--border-strong);
      border-radius: 7px;
    }
    .seg {
      font: inherit;
      font-size: 12px;
      line-height: 1.3;
      padding: 3px 10px;
      border: none;
      border-radius: 5px;
      background: transparent;
      color: var(--fg-muted);
      cursor: pointer;
      white-space: nowrap;
    }
    .seg:hover:not(.active) { color: var(--fg); }
    .seg.active {
      background: var(--border-strong);
      color: var(--fg-bright);
      font-weight: 500;
      box-shadow: 0 1px 2px rgba(1, 4, 9, 0.6);
    }
    .setting {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
      border-top: 1px solid var(--border);
    }
    .setting label { font-size: 12px; color: #adbac7; }
    .passkeys-input {
      font: inherit; font-size: 12px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      width: 130px; padding: 4px 8px;
      background: var(--card); color: var(--fg);
      border: 1px solid var(--border); border-radius: 6px;
    }
    .passkeys-input:focus { border-color: var(--accent); outline: none; }
    #key-passthrough-setting[hidden] { display: none; }
    .setting select {
      font-size: 12px;
      padding: 2px 4px;
      border: 1px solid var(--border-strong);
      border-radius: 4px;
      background: var(--bg);
      color: var(--fg);
    }
    .setting button.keycapture {
      font-size: 12px;
      font-family: inherit;
      padding: 2px 8px;
      min-width: 92px;
      border: 1px solid var(--border-strong);
      border-radius: 4px;
      background: var(--bg);
      color: var(--fg);
      cursor: pointer;
    }
    .setting button.keycapture.capturing {
      border-color: var(--accent);
      color: var(--fg-muted);
      font-style: italic;
    }
    .setting-hint {
      font-size: 11px;
      color: var(--danger);
      padding: 0 0 6px;
    }

    /* --- Per-site rule section --- */
    .rules-section {
      margin-top: 8px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }
    .rules-header {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--fg-muted);
      margin-bottom: 6px;
    }
    .rules-host {
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
      color: var(--fg);
      text-transform: none;
      letter-spacing: 0;
    }
    .rule-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
    }
    .rule-card.disabled { opacity: 0.6; }
    .rule-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .rule-pattern {
      flex: 1;
      font-family: ui-monospace, SFMono-Regular, monospace;
      font-size: 12px;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .entries-list {
      margin-top: 6px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .entries-list:empty::before {
      content: "No entries yet.";
      font-size: 11px;
      color: var(--fg-muted);
      font-style: italic;
    }
    .entry {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
    }
    .entry-toggle { margin: 0; flex: none; cursor: pointer; }
    .entry-off .entry-text { opacity: 0.45; text-decoration: line-through; }
    .entry-off .entry-kind { opacity: 0.4; }
    .entry-kind {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 9px;
      font-weight: bold;
    }
    .entry-kind.exclude { background: var(--exclude); }
    .entry-kind.include { background: var(--include); }
    .entry-kind.reveal { background: var(--reveal); }
    .entry-text {
      flex: 1;
      font-family: ui-monospace, SFMono-Regular, monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--fg);
    }
    .entry-remove {
      font: inherit;
      padding: 0 4px;
      border: none;
      background: none;
      color: var(--fg-muted);
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
    }
    .entry-remove:hover { color: var(--danger); }
    .add-entry {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px dashed var(--border);
    }
    .add-entry-row {
      display: flex;
      gap: 4px;
      margin-bottom: 4px;
    }
    .add-entry-row select,
    .add-entry-row input,
    .add-entry-row button {
      font: inherit;
      padding: 3px 6px;
      border: 1px solid var(--border-strong);
      border-radius: 4px;
      background: var(--bg);
      color: var(--fg);
      font-size: 12px;
    }
    .add-entry-row input::placeholder { color: var(--fg-muted); }
    .add-entry-row select { flex: 0 0 auto; }
    .add-entry-row input.matcher,
    .add-entry-row input.codeword {
      flex: 1;
      min-width: 0;
      font-family: ui-monospace, SFMono-Regular, monospace;
    }
    .add-entry-row input.matcher.invalid { border-color: var(--danger); }
    .add-entry-row button.primary {
      background: var(--accent-btn);
      border-color: var(--accent-btn);
      color: #fff;
      cursor: pointer;
    }
    .add-entry-row button.primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .add-entry-row button.secondary {
      cursor: pointer;
    }
    .resolve-row {
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .resolve-row label {
      font-size: 11px;
      color: var(--fg-muted);
    }
    .feedback {
      font-size: 11px;
      color: var(--fg-muted);
      margin-top: 4px;
      min-height: 14px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .feedback.error { color: var(--danger); }
    .feedback code {
      background: var(--border);
      padding: 0 3px;
      border-radius: 3px;
      font-family: ui-monospace, SFMono-Regular, monospace;
    }
    .no-rule {
      font-size: 12px;
      color: var(--fg-muted);
    }
    .no-rule .suggested {
      margin: 6px 0;
      font-family: ui-monospace, SFMono-Regular, monospace;
      color: var(--fg);
    }
    .no-rule button {
      font: inherit;
      padding: 4px 10px;
      border: 1px solid var(--accent-btn);
      background: var(--accent-btn);
      color: #fff;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    .no-rule button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      background: var(--surface);
      border-color: var(--border-strong);
    }
    .add-rule-row { margin-top: 10px; }
    .add-rule-row button {
      font: inherit;
      font-size: 12px;
      padding: 5px 10px;
      width: 100%;
      border: 1px dashed var(--accent);
      background: transparent;
      color: var(--accent);
      border-radius: 4px;
      cursor: pointer;
    }
    .add-rule-row button:hover { background: rgba(255, 255, 255, 0.06); }

    .info {
      color: var(--fg-muted);
      font-size: 11px;
      margin-top: 12px;
      border-top: 1px solid var(--border);
      padding-top: 8px;
    }
    .popup-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }
    .footer-btn {
      font: inherit;
      font-size: 12px;
      cursor: pointer;
      background: none;
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 5px 10px;
    }
    .footer-help {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--fg-muted);
    }
    .footer-help:hover { color: var(--fg); border-color: var(--border); }
    .footer-key {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 17px;
      height: 17px;
      padding: 0 3px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      line-height: 1;
    }
    .footer-settings {
      color: var(--accent);
      border-color: var(--border);
    }
    .footer-settings:hover { border-color: var(--accent); background: rgba(88, 166, 255, 0.1); }
    .grant-access {
      font: inherit;
      font-size: 12px;
      display: block;
      width: 100%;
      margin: 2px 0 8px;
      padding: 5px 10px;
      border: 1px solid var(--accent-btn);
      background: var(--accent-btn);
      color: #fff;
      border-radius: 4px;
      cursor: pointer;
    }
    /* The `display: block` above overrides the UA `[hidden] { display: none }`,
       so the button would show even when JS sets `hidden` (e.g. once connected).
       Restore hidden's effect explicitly. */
    .grant-access[hidden] { display: none; }
  </style>
</head>
<body>
  <h2><img src="icons/icon48.png" alt="">BranchKit Browser</h2>
  <div class="status">
    <span class="dot" id="dot"></span>
    <span id="status-text">Checking...</span>
  </div>
  <button id="grant-access" class="grant-access" hidden
          title="Lets the extension reach the BranchKit app on your computer (127.0.0.1). Firefox requires granting this host access before voice can connect.">
    Allow BranchKit connection
  </button>
  <div class="readout" id="readout" hidden>
    <span class="readout-dot" id="readout-dot"></span>
    <span id="readout-text"></span>
  </div>

  <div class="setting">
    <label>Hints</label>
    <div class="segmented" id="hint-visibility" role="radiogroup" aria-label="Hints">
      <button class="seg active" data-value="always" role="radio">Always</button>
      <button class="seg" data-value="manual" role="radio">Toggle (f)</button>
    </div>
  </div>
  <div class="setting">
    <label>Hint labels</label>
    <div class="segmented" id="hint-mode" role="radiogroup" aria-label="Hint labels">
      <button class="seg active" data-value="letter" role="radio">Letters</button>
      <button class="seg" data-value="word" role="radio">Words</button>
      <button class="seg" data-value="expand" role="radio">Expand</button>
    </div>
  </div>
  <div class="setting" title="Prefix each tab's title with a codeword label (e.g. '[a] GitHub') so you can see the word to say or the letter to type. Press T or say 'tab' to switch.">
    <label>Tab Hints</label>
    <div class="segmented" id="tab-markers" role="radiogroup" aria-label="Tab Hints">
      <button class="seg active" data-value="on" role="radio">On</button>
      <button class="seg" data-value="off" role="radio">Off</button>
    </div>
  </div>
  <div class="rules-section" id="rules-section">
    <div class="rules-header">
      Rules for <span class="rules-host" id="rules-host">…</span>
    </div>
    <div id="rules-body"></div>
  </div>

  <div class="rules-section" id="key-rules-section">
    <div class="rules-header">Keyboard on this site</div>
    <div class="setting" id="key-shortcuts-setting" title="When Off, BranchKit's keyboard shortcuts are disabled on this site so the site's own keys work. Voice still works. (Press i on any page to pass keys through temporarily.)">
      <label>Shortcuts here</label>
      <div class="segmented" id="key-shortcuts" role="radiogroup" aria-label="Keyboard shortcuts on this site">
        <button class="seg active" data-value="on" role="radio">On</button>
        <button class="seg" data-value="off" role="radio">Off</button>
      </div>
    </div>
    <div class="setting" id="key-passthrough-setting" title="Keys to hand to this site while your other BranchKit shortcuts keep working — e.g. jke#r for Gmail. Type the characters; each is one key.">
      <label>Pass keys to site</label>
      <input type="text" id="key-passthrough" class="passkeys-input" placeholder="e.g. jke#" spellcheck="false" autocomplete="off" autocapitalize="off">
    </div>
  </div>

  <div class="popup-footer">
    <button id="open-help" class="footer-btn footer-help"
            title="Press ? or say &quot;help&quot; to open this anytime">
      <span class="footer-key">?</span> Help
    </button>
    <button id="open-options" class="footer-btn footer-settings">Settings</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 260px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #333;
      margin: 0;
    }
    h2 {
      font-size: 15px;
      margin: 0 0 12px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h2 img { width: 20px; height: 20px; }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.connected { background: #34c759; }
    .dot.disconnected { background: #ff3b30; }
    .setting {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-top: 1px solid #eee;
    }
    .setting label {
      font-size: 12px;
      color: #555;
    }
    .setting select {
      font-size: 12px;
      padding: 2px 4px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
    }
    .info {
      color: #888;
      font-size: 11px;
      margin-top: 12px;
      border-top: 1px solid #eee;
      padding-top: 8px;
    }
  </style>
</head>
<body>
  <h2><img src="icons/icon48.png" alt="">BranchKit Browser</h2>
  <div class="status">
    <span class="dot" id="dot"></span>
    <span id="status-text">Checking...</span>
  </div>
  <div class="setting">
    <label for="hint-mode">Hint labels</label>
    <select id="hint-mode">
      <option value="letter">Letters</option>
      <option value="word">Words</option>
      <option value="both">Both</option>
    </select>
  </div>
  <div class="info">
    Voice-navigable hint badges for interactive page elements.
    Connects to the BranchKit desktop app on localhost.
  </div>
  <script src="popup.js"></script>
</body>
</html>
